<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subclasses</title>
    <style>
        div {
            display: inline-block;
            background-color: #6A5800;
            text-align: center;
            border: 1px solid black;
            width: 200px;
            height: 200px;
        }
        p {
            color: white;
            font-size: 20px;
        }
        div:hover {
            background-color: #4E4100 ;
        }
    </style>
</head>
<body>
    <div id="1d">
        <p>01</p>
    </div>

    <div id="2d">
        <p>02</p>
    </div>

    <div id="3d">
        <p>03</p>
    </div>

</body>
</html>
