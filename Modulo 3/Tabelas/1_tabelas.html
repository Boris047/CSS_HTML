<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeira Tabela</title>
    <style>
        Body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            border: 2px solid black;
            border-collapse: collapse;
            border-radius: 8px;
        }

        td{
            border: 1px solid black;
            padding: 40px;
        }
    </style>

</head>
<body>
    <h1>Minha primeira tabela</h1>

    <!-- Hierarquia Basica de tabelas
     TABLE = TABELA
           TABLE ROW = Linha da Tabela
              TABLE HEADER = Cabeçalho da Tabela
              TABLE DATA = Dado da tabela 
    -->
    <Table>
        <tr> <!-- Primeira linha da tabela -->
            <td>A1</td>
            <td>A2</td>
            <td>A3</td>
            <td>A4</td>
        </tr>
        <tr>
            <td>B1</td>
            <td>B2</td>
            <td>B3</td>
            <td>B4</td>
        </tr>
        <tr>
            <td>C1</td>
            <td>C2</td>
            <td>C3</td>
            <td>C4</td>
        </tr>
        <tr>
            <td>D1</td>
            <td>D2</td>
            <td>D3</td>
            <td>D4</td>
        </tr>
    </Table>
</body>
</html>
